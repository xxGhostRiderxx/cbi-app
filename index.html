<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Beliefs Inventory (CBI)</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Career Beliefs Inventory (CBI)</h1>

<!-- MODE -->
<div id="modeSelect" class="card">

<h2>Choose Mode</h2>

<button onclick="setMode('student')">Student Mode</button>
<button onclick="setMode('coach')">Coach Mode</button>

</div>

<!-- QUIZ -->
<div id="quizCard" class="card" style="display:none;">

<h2 id="questionText"></h2>

<div id="options"></div>

<p id="progressText"></p>

<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>

</div>

<!-- RESULTS -->
<div id="resultCard" class="card" style="display:none;">

<h2>Results</h2>

<p id="profile"></p>
<p id="primary"></p>

<canvas id="radarChart" width="300" height="300"></canvas>

<div class="actions">

<button onclick="generateAdvice()">Advice</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="goToCoach()">Coach Mode</button>

</div>

<div id="adviceBox"></div>

</div>

<!-- COACH -->
<div id="coachPanel" class="card" style="display:none;"></div>

<!-- MODAL -->
<div id="modal" class="modal" style="display:none;">
<div class="modal-content">
<h3 id="mTitle"></h3>
<p id="mText"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Krumboltz CBI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
<div>🎓 Krumboltz CBI</div>

<div>
<button onclick="setMode('student')">🧑‍🎓 Student</button>
<button onclick="setMode('coach')">🧑‍🏫 Coach</button>
</div>
</header>

<div class="container">

<section id="quizCard" class="card hidden">
<div class="progressBar" id="progressBar"></div>
<h2 id="qText"></h2>
<div id="options"></div>
</section>

<section id="resultCard" class="card hidden">

<h2>📊 Career Profile Dashboard</h2>

<p id="profile"></p>

<canvas id="radar" width="420" height="420"></canvas>

<h3>Snapshot Table</h3>
<table>
<tr><th>Dimension</th><th>Score</th><th>Meaning</th></tr>
<tr><td>Indecision</td><td id="selS"></td><td>Decision difficulty</td></tr>
<tr><td>Control</td><td id="conS"></td><td>Agency</td></tr>
<tr><td>Risk</td><td id="risS"></td><td>Uncertainty tolerance</td></tr>
<tr><td>Exploration</td><td id="expS"></td><td>Exposure level</td></tr>
</table>

<p><b>Confidence:</b> <span id="conf"></span></p>
<p><b>Signal:</b> <span id="signal"></span></p>

<hr>

<h3>Primary Challenge</h3>
<p id="primary"></p>
<p id="meaning"></p>
<p id="feedback"></p>

<button onclick="setMode('coach')">Go Coach Dashboard</button>

</section>

<section id="coachCard" class="card hidden"></section>

</div>

<script src="script.js"></script>
</body>
</html>
